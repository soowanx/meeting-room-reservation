<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회의실 예약 관리</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="page-header">
    <div>
        <p class="eyebrow">Meeting Room Reservation</p>
        <h1>회의실 예약 관리</h1>
        <p class="subtitle">사용자는 회의실을 예약하고, 관리자는 회의실과 예약 상태를 관리할 수 있습니다.</p>
    </div>
    <nav class="header-links">
        <a class="text-link" th:href="@{/reservations/my}">내 예약 조회</a>
        <a class="button secondary" th:href="@{/admin/login}">관리자</a>
    </nav>
</header>

<main class="container">
    <section class="room-grid">
        <article class="card room-card" th:each="room : ${rooms}">
            <div class="card-top">
                <div>
                    <h2 th:text="${room.name}">Ocean</h2>
                    <p class="muted" th:text="${room.location}">8F A구역</p>
                </div>
                <span class="badge" th:text="'정원 ' + ${room.capacity} + '명'">정원 8명</span>
            </div>
            <p th:text="${room.description}">설명</p>
            <a class="button" th:href="@{/rooms/{id}(id=${room.id})}">예약하기</a>
        </article>
    </section>
</main>
</body>
</html>
