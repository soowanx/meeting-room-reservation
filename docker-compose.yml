services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/meeting_room_db
      SPRING_DATASOURCE_USERNAME: meeting_user
      SPRING_DATASOURCE_PASSWORD: meeting_pass
      APP_ADMIN_PASSWORD: admin1234
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: meeting_room_db
      POSTGRES_USER: meeting_user
      POSTGRES_PASSWORD: meeting_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeting_user -d meeting_room_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
